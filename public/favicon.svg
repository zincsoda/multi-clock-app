<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title">
  <title>Signage Timeboard icon</title>
  <defs>
    <linearGradient id="g" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#7f5af0" />
      <stop offset="100%" stop-color="#2cb67d" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="120" fill="url(#g)"/>
  <g transform="translate(256 256)" filter="url(#glow)">
    <circle r="176" fill="#07070c" />
    <circle r="150" fill="none" stroke="#ffffff" stroke-width="14" opacity="0.9"/>
    <circle r="12" fill="#ffffff" />
    <line x1="0" y1="0" x2="0" y2="-95" stroke="#ffffff" stroke-width="18" stroke-linecap="round" />
    <line x1="0" y1="0" x2="74" y2="46" stroke="#86efac" stroke-width="12" stroke-linecap="round" />
    <circle cx="-86" cy="-86" r="12" fill="#ffffff" opacity="0.8"/>
    <circle cx="86" cy="-86" r="12" fill="#ffffff" opacity="0.8"/>
    <circle cx="86" cy="86" r="12" fill="#ffffff" opacity="0.8"/>
    <circle cx="-86" cy="86" r="12" fill="#ffffff" opacity="0.8"/>
  </g>
</svg>
